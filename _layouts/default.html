<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
      background: #fff;
    }
    header {
      border-bottom: 3px solid #c41e3a;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }
    .site-title {
      font-size: 2rem;
      color: #c41e3a;
      text-decoration: none;
      font-weight: bold;
    }
    .site-title:hover {
      color: #d4af37;
    }
    nav {
      margin-top: 1rem;
    }
    nav a {
      display: inline-block;
      margin-right: 1.5rem;
      color: #333;
      text-decoration: none;
      padding: 0.25rem 0;
      border-bottom: 2px solid transparent;
    }
    nav a:hover,
    nav a.active {
      color: #c41e3a;
      border-bottom-color: #c41e3a;
    }
    main {
      min-height: 60vh;
    }
    h1, h2, h3 {
      color: #1a1a1a;
    }
    h1 {
      color: #c41e3a;
    }
    a {
      color: #c41e3a;
    }
    a:hover {
      color: #d4af37;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }
    th, td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      background: #f5f5f5;
      font-weight: bold;
    }
    tr:hover {
      background: #fafafa;
    }
    hr {
      border: none;
      border-top: 2px solid #d4af37;
      margin: 2rem 0;
    }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid #ddd;
      color: #666;
      font-size: 0.9rem;
      text-align: center;
    }
    @media (max-width: 600px) {
      nav a {
        display: block;
        margin: 0.5rem 0;
      }
      table {
        font-size: 0.85rem;
      }
      th, td {
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
    <nav>
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Hem</a>
      <a href="{{ '/menu' | relative_url }}" {% if page.url contains 'menu' %}class="active"{% endif %}>Meny</a>
      <a href="{{ '/buffet' | relative_url }}" {% if page.url contains 'buffet' %}class="active"{% endif %}>Buffé</a>
      <a href="{{ '/hotpot-bbq' | relative_url }}" {% if page.url contains 'hotpot' %}class="active"{% endif %}>Hotpot & BBQ</a>
      <a href="{{ '/contact' | relative_url }}" {% if page.url contains 'contact' %}class="active"{% endif %}>Kontakt</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. Välkommen!</p>
  </footer>
</body>
</html>
